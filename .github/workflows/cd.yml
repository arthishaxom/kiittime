name: CD

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  eas-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Detect mobile & native file changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            mobile:
              - 'apps/mobile/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
            native:
              - 'apps/mobile/app.config.js'
              - 'apps/mobile/eas.json'
              - 'apps/mobile/android/**'
              - 'apps/mobile/package.json'
              - 'package.json'

      - name: Setup pnpm
        if: steps.changes.outputs.mobile == 'true'
        uses: pnpm/action-setup@v5
        with:
          version: 11.12.0

      - name: Setup Node.js
        if: steps.changes.outputs.mobile == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup Expo / EAS CLI
        if: steps.changes.outputs.mobile == 'true'
        uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        if: steps.changes.outputs.mobile == 'true'
        run: pnpm install --frozen-lockfile

      # MAIN BRANCH (Production)
      - name: Run EAS Build Production (Native Changes on Main)
        if: github.ref == 'refs/heads/main' && steps.changes.outputs.mobile == 'true' && steps.changes.outputs.native == 'true'
        working-directory: apps/mobile
        run: eas build --platform android --profile production --auto-submit --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Run EAS Update Production (JS/Asset Changes on Main)
        if: github.ref == 'refs/heads/main' && steps.changes.outputs.mobile == 'true' && steps.changes.outputs.native == 'false'
        working-directory: apps/mobile
        run: eas update --platform android --branch production --message "deploying to production from CD (${{ github.sha }})" --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # DEV BRANCH (Preview)
      - name: Run EAS Build Preview (Native Changes on Dev)
        if: github.ref == 'refs/heads/dev' && steps.changes.outputs.mobile == 'true' && steps.changes.outputs.native == 'true'
        working-directory: apps/mobile
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Run EAS Update Preview (JS/Asset Changes on Dev)
        if: github.ref == 'refs/heads/dev' && steps.changes.outputs.mobile == 'true' && steps.changes.outputs.native == 'false'
        working-directory: apps/mobile
        run: eas update --platform android --branch preview --message "deploying to preview from CD (${{ github.sha }})" --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
