services:
  postgres:
    image: docker.io/library/postgres:17
    container_name: kiittime-local-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Kolkata
    ports:
      - "5432:5432"
    volumes:
      - kiittime_pgdata:/var/lib/postgresql/data

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: kiittime-redis
    ports:
      - "6379:6379"

volumes:
  kiittime_pgdata: