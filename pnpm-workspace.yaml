packages:
  - 'apps/*'
  - 'packages/*'

nodeLinker: hoisted

allowBuilds:
  sharp: true
  esbuild: true
  lightningcss: true
  unrs-resolver: true

minimumReleaseAgeExclude:
  - jest-expo@57.0.2

overrides:
  react: "^19.2.0"
  react-dom: "^19.2.0"
  "@types/react": "^19.2.0"
  "@types/react-dom": "^19.2.0"

peerDependencyRules:
  allowedVersions:
    react: "19"
    react-dom: "19"
    "@types/react": "19"
    "@types/react-dom": "19"
  ignoreMissing:
    - react
    - react-dom

