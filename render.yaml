# Exported from Render on 2026-07-24T11:30:43Z
version: "1"
projects:
- name: kiit-time-be
  environments:
  - name: Production
    services:
    - type: web
      name: kiittime-backend
      runtime: python
      repo: https://github.com/arthishaxom/kiittime
      plan: free
      envVars:
      - key: REDIS_URL
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      region: singapore
      buildCommand: uv sync --frozen
      preDeployCommand: uv run alembic upgrade head
      startCommand: uv run fastapi run src/backend/main.py --host 0.0.0.0 --port $PORT
      domains:
      - api.kiittime.apothal.dev
      autoDeployTrigger: commit
      rootDir: apps/backend
