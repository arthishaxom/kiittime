services:
  - type: web
    name: kiittime-backend
    runtime: python
    rootDir: apps/backend
    buildCommand: uv sync --frozen
    preDeployCommand: uv run alembic upgrade head
    startCommand: uv run fastapi run src/backend/main.py --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kiittime-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: REDIS_URL
        sync: false

databases:
  - name: kiittime-db
    databaseName: kiittime
    user: kiittime
